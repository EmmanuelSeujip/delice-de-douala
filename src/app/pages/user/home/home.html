<app-header 
  (ratingChanged)="filterByRating($event)" 
  [allRestaurants]="allRestaurants()">
</app-header>
<main>
  <section>
    <h1 class="big-title">Découvrez les saveurs de Douala</h1>
    <p class="medium-title">Un guide gastronomique organisé par quartiers. Notez vos expériences pour créer votre carnet de route personnalisé.</p>
  </section>
  <app-restaurant-list 
    [allRestaurants]="restaurants()" 
    (ratingChanged)="updateRating($event)">
  </app-restaurant-list>
  <app-carte></app-carte>
</main>
