<app-auth-user>
  <div class="">
    Inscription
  </div>
  <div>Retrouvez le meilleur de la gastronomie camerounaise</div>
  <form action="" class="d-flex flex-column">
    <div class="field">
      <label for="name" class="form-label">Nom <span>*</span></label>
      <input type="text" id="name" required [(ngModel)]="user.nom" >
    </div>
    <div class="field">
      <label for="subname">Prénom</label>
      <input type="text" id="subname" [(ngModel)]="user.subname">
    </div>
    <div class="field">
      <label for="email">Email <span>*</span></label>
      <input type="email" id="email" [(ngModel)]="user.email">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" [(ngModel)]="user.password">
    </div>
    <div class="field">
      <label for="confirmPassword">Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword">
    </div>
    <button type="submit" class="btn btn-primary mt-3">
      Soumettre
    </button>
  </form>
  <pre>
    {{user | json}}
  </pre>
</app-auth-user>
