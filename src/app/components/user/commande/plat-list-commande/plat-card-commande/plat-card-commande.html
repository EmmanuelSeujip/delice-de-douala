<div class="commande w-100 d-flex gap-3 border-bottom border-primary border-opacity-25 pb-3">
  <img [src]="commande().plat.image" 
        [alt]="commande().plat.nom" 
        class="image rounded"      
  >
  <div class="all-info d-flex flex-column gap-3 ">
    <div class="d-flex flex-column gap-1">   
      <div class="big-text d-flex w-100 justify-content-between align-items-center text-primary">
        {{commande().plat.nom}}
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-1">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg> 
      </div>
      <div class="small-text">{{commande().restaurantName}} </div>
    </div>
    <div class="d-flex w-100 justify-content-between align-items-center">
      <div class="quantite">
        <span>-</span>
        <span>{{commande().quantite}} </span>
        <span>+</span>
      </div>
      <div class="text-primary big-text">
        {{commande().quantite*commande().plat.prix}}
      </div>
    </div>
  </div>
</div>
