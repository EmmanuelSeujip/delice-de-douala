<section class="w-100 card flex-4 py-4 px-3">
  <div class="border-bottom border-primary  pb-3 mb-4">
    Votre panier ({{listCommande().length}})
  </div>
  <div class='d-flex flex-column gap-3 w-100'>
    @for (item of listCommande(); track $index) {
      <app-plat-card-commande [commande]="item" />
    }
  </div>
  <div class="d-flex w-100 justify-content-between align-items-center mt-4">
    <span>Total :</span>
    <span class="text-primary big-text">{{listCommande().reduce((total,item)=>total+item.quantite*item.plat.prix,0)}} FCFA </span>
  </div>
</section>
