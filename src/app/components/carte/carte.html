<div class="container py-5">
  <h1 class="text-center mb-4 fw-bold primary-text">Notre Menu Traditionnel</h1>
  <div class="d-flex justify-content-center mb-5">
    <ul class="nav nav-pills bg-light p-2 rounded-pill shadow-sm">
      @for (tab of filterTabs; track tab.id) {
        <li class="nav-item">
          <button 
            class="nav-link rounded-pill px-4 fw-semibold border-0 transition-all"
            [class.active]="currentFilter === tab.id"
            [class.primary-bg]="currentFilter === tab.id"
            (click)="setFilter(tab.id)">
            {{ tab.label }}
          </button>
        </li>
      }
    </ul>
  </div>

  <div class="menu-scroll-container overflow-x-auto pb-3">
    
    <div class="d-flex flex-column flex-wrap menu-grid-height">
      @for (item of plats(); track item.id) {
        <div class="menu-card-wrapper p-2">
          <div class="card h-100 shadow-sm border-0 transition-hover">
            <img [src]="item.image" class="card-img-top object-fit-cover" [alt]="item.nom" style="height: 160px;">
            <div class="card-body d-flex flex-column justify-content-between">
              <div>
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <h5 class="card-title fw-bold text-truncate mb-0" style="max-width: 65%;">{{ item.nom }}</h5>
                  <span class="badge primary-bg-subtle primary-text rounded-pill px-2 py-1 small">{{ item.prix }} FCFA</span>
                </div>
                <p class="card-text text-muted small text-line-clamp">{{ item.description }}</p>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <span class="badge text-uppercase bg-secondary-subtle text-secondary px-2 py-1 style-category">{{ item.categorie }}</span>
                <button class="btn btn-outline-primary-custom btn-sm px-3">Commander</button>
              </div>
            </div>
          </div>
        </div>
      } @empty {
        <div class="w-100 text-center py-5 text-muted fw-medium">
          Aucun plat trouvé dans cette catégorie.
        </div>
      }
    </div>
  </div>
</div>
