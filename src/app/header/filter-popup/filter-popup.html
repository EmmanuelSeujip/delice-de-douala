@if (isView()) {
  <div class="popup">
    <p class="popup-label">Note minimum</p>
    <div class="range-wrapper">
      <div class="bubble" [style.left]="currentRating / 5 * 100 + '%'">
        {{ currentRating.toFixed(1) }}
      </div>
      <input
        type="range" min="0" max="5" step="0.1" [value]="currentRating"
        (input)="onSliderChange($event)"
      />
    </div>
    <div class="range-labels">
      <span>0</span><span>5</span>
    </div>
  </div>
}
